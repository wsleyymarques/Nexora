spring:
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/nexora
    username: ${DB_USERNAME:nexora}
    password: ${DB_PASSWORD:nexora}
    driver-class-name: org.postgresql.Driver

  security:
    oauth2:
      client:
      registration:
        google:
          client-id: ${GOOGLE_CLIENT_ID}
          client-secret: ${GOOGLE_CLIENT_SECRET}
          scope:
            - email
            - profile
          redirect-uri: "{baseUrl}/api/v1/auth/google/callback"
      provider:
        google:
          authorization-uri: https://accounts.google.com/o/oauth2/auth
          token-uri: https://oauth2.googleapis.com/token
          user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
          user-name-attribute: sub

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:nexora}
    password: ${SPRING_RABBITMQ_PASSWORD:nexora}

server:
  port: 8080

nexora:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-must-be-at-least-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  storage:
    endpoint: ${R2_ENDPOINT}
    bucket: ${R2_BUCKET}
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}
    public-base-url: ${R2_PUBLIC_BASE_URL}
  email:
    api-key: ${RESEND_API_KEY}
    from: ${RESEND_FROM_ADDRESS}